<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HomeDesign</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="header">
        <div class="container">
            <nav class="nav">
                <button id="open-menu" class="menu-toggle" title="ouvrir menu">
                    <i class='bx bx-menu'></i>
                </button>
                <div class="header-content mobile-hidden">
                <button id="close-menu" class="menu-toggle" title="fermer menu">
                    <i class='bx bx-x'></i>
                </button>
                <a href="index.html" class="logo-content">
                    <img src="images/Logo3.png" alt="Logo Maison Design">
                </a>
    
                <ul class="menu-list">
                    <li><a href="#home" class="nav-link active-navlink">Clients</a></li>
                    <li><a href="#apropos" class="nav-link">Produits</a></li>
    
                    <li><a href="#categories" class="nav-link">Commandes</a></li>
                    
                </ul>
                <div class="search-bar">
                    <input type="text" placeholder="Rechercher un produit..." class="search-input">
                    <button class="search-button" title="Rechercher">
                        <i class='bx bx-search '></i>
                    </button>
                </div>
    
                <div class="cote-droit">
                    <a href="index.html" class="nav-link" title="Déconnexion">
                        <i class='bx bx-user user-icon'></i>
                    </a>
                    
                </div>
            </div>
            </nav>
        </div>
    </header>
    
</body>

</html>
